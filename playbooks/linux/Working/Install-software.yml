---
- hosts: localhost
  connection: local
  become: yes
  tasks:
    - name: Install common tools
      apt:
        name: "{{ item }}"
        state: latest
        update_cache: yes
      loop:
        - guake
        - zsh
        - fastfetch
        - figlet
        - nala
        - eza
        - caffeine
        - conky-all
        - copyq
        - spell
        - rclone
        - git
        - rofi
        - lf
        - polybar
        - mpd
        - ncmpcpp
        - mixxx
        - flatpak
        - ffmpeg
        - yt-dlp
        - gnome-tweaks
        - python3
        - pip
        - pipx

    - name: Install common tools
      community.general.pipx:
        name: "{{ item }}"
        state: latest
      loop:
        - tldr
